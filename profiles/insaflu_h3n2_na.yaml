metadata_fields:
  - strain
  - date
  - genbank_accession
  - location
renamed_metadata_fields:
  - strain
  - date
  - accession
  - full_location

lat-longs: "config/lat_longs.tsv"

segments:
  - na

submission_date_field: date
recency:
  date_bins: [7, 30, 90]
  date_bin_labels: ["last week", "last month", "last quarter"]
  upper_bin_label: older

custom_rules:
   - workflow/snakemake_rules/insaflu_na_custom_rules.smk

builds:
    "h3n2":
      lineage: h3n2
      reference: "config/h3n2/{segment}/reference.fasta"
      annotation: "config/h3n2/{segment}/genemap.gff"
      auspice_config: "config/h3n2/{segment}/auspice_config_insaflu.json"
      subsamples:
        global:
            filters: " "
